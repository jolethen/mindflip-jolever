<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MindFlip | Space Memory</title>
    <link rel="stylesheet" href="global.css">

    <link rel="preload" href="assets/flip.mp3" as="audio">
    <link rel="preload" href="assets/match.mp3" as="audio">
    <link rel="preload" href="assets/wrong.mp3" as="audio">
    <link rel="preload" href="assets/win.mp3" as="audio">
</head>
<body>

<canvas id="bg"></canvas>

<div id="menu">
    <div class="menu-box">
        <h1>🧠 MindFlip</h1>
        
        <p>Game Mode</p>
        <div class="btn-group" id="modeSelect">
            <button class="active" onclick="selectMode('single',this)">Single</button>
            <button onclick="selectMode('multi',this)">Multi</button>
        </div>
        
        <input id="p1" placeholder="Player 1 Name">
        <input id="p2" placeholder="Player 2 Name" style="display:none;">
        
        <p>Difficulty</p>
        <div class="btn-group" id="diffSelect">
            <button class="active" onclick="selectDiff(4,this)">Easy</button>
            <button onclick="selectDiff(6,this)">Medium</button>
            <button onclick="selectDiff(8,this)">Hard</button>
        </div>
        
        <p>Select Level</p>
        <div id="levels"></div>
        
        <button class="start-btn" onclick="startGame()">▶ Start Mission</button>
    </div>
</div>

<div id="victory-screen" class="victory-overlay" style="display:none;">
    <div class="victory-box">
        <div class="trophy">🏆</div>
        <h2 id="winner-display">Winner!</h2>
        <div id="record-msg" style="color:#facc15; font-weight:bold; margin-bottom:10px; font-size:1.1rem;"></div>
        
        <div class="victory-btns">
            <button class="start-btn" onclick="restartLevel()">🔄 Play Again</button>
            <button class="secondary-btn" onclick="backToMenu()">🏠 Main Menu</button>
        </div>
    </div>
</div>

<h3 id="stats"></h3>
<div id="turn"></div>
<div class="grid" id="grid"></div>

<script>
/** 🌌 BACKGROUND ANIMATION **/
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
let stars = [];

function initBG() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    for(let i=0; i<120; i++){
        stars.push({
            x: Math.random() * canvas.width, 
            y: Math.random() * canvas.height, 
            size: Math.random() * 2
        });
    }
}

function animateBG(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "white";
    stars.forEach(s => {
        ctx.fillRect(s.x, s.y, s.size, s.size);
        s.y += 0.2;
        if(s.y > canvas.height) s.y = 0;
    });
    requestAnimationFrame(animateBG);
}
initBG();
animateBG();
window.addEventListener('resize', initBG);

/** 🎮 GAME STATE & CONFIG **/
const symbols = ["🚀","👽","🌕","🛸","⭐","🌌","☄️","🪐","🤖","📡","🛰️","🔭"];
let cards=[], flipped=[];
let players=["P1","P2"];
let scores=[0,0];
let turn=0;
let mode="single";
let difficulty=4;
let selectedLevel=1;
let lockBoard = false;

// 🔊 2. AUDIO ENGINE CONFIG
const sounds = {
    flip: new Audio('./assets/flip.mp3'),
    match: new Audio('./assets/match.mp3'),
    wrong: new Audio('./assets/wrong.mp3'),
    win: new Audio('./assets/win.mp3')
};

function playSound(name) {
    if (sounds[name]) {
        sounds[name].currentTime = 0; // Allows sound to overlap/restart quickly
        sounds[name].play().catch(e => console.log("Sound check:", e.message));
    }
}

function selectMode(m, btn){
    mode = m;
    document.querySelectorAll("#modeSelect button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("p2").style.display = (m === 'multi') ? "block" : "none";
}

function selectDiff(d, btn){
    difficulty = d;
    document.querySelectorAll("#diffSelect button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

const levelContainer = document.getElementById("levels");
for(let i=1; i<=40; i++){
    let btn = document.createElement("button");
    btn.innerText = i;
    btn.className = "level-btn" + (i === 1 ? " active" : "");
    btn.onclick = () => {
        selectedLevel = i;
        document.querySelectorAll(".level-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
    };
    levelContainer.appendChild(btn);
}

/** 🕹️ GAME ENGINE **/
function startGame(){
    // 🔊 3. UNLOCK AUDIO (Required for Mobile)
    Object.values(sounds).forEach(s => {
        s.load();
        s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(() => {});
    });

    document.getElementById("menu").style.display = "none";
    document.getElementById("victory-screen").style.display = "none";
    players[0] = document.getElementById("p1").value || "Player 1";
    players[1] = document.getElementById("p2").value || "Player 2";
    scores = [0, 0];
    turn = 0;
    loadGame();
}

function loadGame(){
    let size = difficulty;
    if(selectedLevel > 10 && size < 6) size = 6;
    if(selectedLevel > 20 && size < 8) size = 8;

    const grid = document.getElementById("grid");
    grid.style.gridTemplateColumns = `repeat(${size}, min(70px, 18vw))`;

    let pairCount = (size * size) / 2;
    let selectedSymbols = symbols.slice(0, pairCount);
    cards = [...selectedSymbols, ...selectedSymbols].sort(() => Math.random() - 0.5);

    grid.innerHTML = "";
    cards.forEach(sym => {
        let card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<div class="inner"><div class="front"></div><div class="back">${sym}</div></div>`;
        card.onclick = () => flip(card, sym);
        grid.appendChild(card);
    });
    updateUI();
}

function flip(card, sym){
    if(lockBoard || card.classList.contains("flipped")) return;

    playSound('flip'); // 🔊 Trigger flip sound
    card.classList.add("flipped");
    flipped.push({card, sym});

    if(flipped.length === 2){
        lockBoard = true; 
        setTimeout(checkMatch, 600);
    }
}

function checkMatch(){
    let [a, b] = flipped;
    if(a.sym === b.sym){
        playSound('match'); // 🔊 Trigger match sound
        scores[turn]++;
        flipped = [];
        lockBoard = false;
        if(document.querySelectorAll(".flipped").length === cards.length) endGame();
    } else {
        playSound('wrong'); // 🔊 Trigger wrong sound
        setTimeout(() => {
            a.card.classList.remove("flipped");
            b.card.classList.remove("flipped");
            flipped = [];
            lockBoard = false;
            if(mode === "multi") turn = (turn === 0) ? 1 : 0;
            updateUI();
        }, 400);
    }
    updateUI();
}

function getHighScoreKey() {
    return `mindflip_score_d${difficulty}_l${selectedLevel}`;
}

function endGame(){
    playSound('win'); // 🔊 Trigger victory sound
    let winner = mode === "single" ? players[0] :
        scores[0] > scores[1] ? players[0] :
        scores[1] > scores[0] ? players[1] : "Draw";

    let isNewRecord = false;
    if(mode === "single"){
        let key = getHighScoreKey();
        let prevBest = localStorage.getItem(key) || 0;
        if(scores[0] > prevBest){
            localStorage.setItem(key, scores[0]);
            isNewRecord = true;
        }
    }

    setTimeout(() => {
        const vicScreen = document.getElementById("victory-screen");
        const winText = document.getElementById("winner-display");
        const recordMsg = document.getElementById("record-msg");
        winText.innerText = winner === "Draw" ? "🤝 It's a Draw!" : "🏆 " + winner + " Wins!";
        recordMsg.innerText = isNewRecord ? "⭐ NEW PERSONAL BEST! ⭐" : "";
        vicScreen.style.display = "flex";
    }, 500);
}

function restartLevel(){
    document.getElementById("victory-screen").style.display = "none";
    scores = [0, 0];
    turn = 0;
    loadGame();
}

function backToMenu(){
    document.getElementById("victory-screen").style.display = "none";
    document.getElementById("menu").style.display = "flex";
    document.getElementById("grid").innerHTML = "";
    document.getElementById("stats").innerHTML = "";
}

function updateUI(){
    const stats = document.getElementById("stats");
    const turnDiv = document.getElementById("turn");

    if(mode === "multi"){
        turnDiv.innerText = players[turn] + "'s Turn";
        stats.innerText = `${players[0]}: ${scores[0]} | ${players[1]}: ${scores[1]}`;
    } else {
        let best = localStorage.getItem(getHighScoreKey()) || 0;
        turnDiv.innerText = "";
        stats.innerHTML = `Score: ${scores[0]} <span style="opacity:0.4; font-size:0.85rem; margin-left:12px;">Best: ${best}</span>`;
    }
}
</script>
</body>
</html>
